query getPublishers {
  publishers {id, name}
}

mutation createPublisher {
  createPublisher(name: "Tusk Love Publisher") {
    id
    name
  }
}

mutation {
  deletePublisher(id: 1) {
    id
    name
  }
}

mutation {
  updatePublisher(id: 1, name: "Super Duper Publishing House") {
    id
    name
  }
}

query {
  authors {id, name, surname}
}

mutation {
  updateAuthor(id: 1, name: "John") {
    id
    name
    surname
  }
}

mutation {
  updateAuthor(id: 1, name: "Jack", surname: "Johnsson") {
    id
    name
    surname
  }
}

mutation {
  createAuthor(name: "John", surname: "Doe") {
    id
    name
    surname
  }
}

mutation {
  deleteAuthor(id:512) {
    name
    surname
  }
}

query {
  books {
    id
    title
    author {
      name
      surname
    }
    publishingYear
    publisher {
      name
    }
  }
}

query getBooks {
  books {
    id
    title
    author {
      name
      surname
    }
  }
}

mutation {
  deleteBook(id:1000) {
    title
  }
}