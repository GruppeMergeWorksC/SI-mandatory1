$kind: graphql-request
name: create-book
url: "{{baseUrl}}"
query: |
  mutation CreateBook {
      createBook(
          title: "How to Obtain Baskets of Kittens vol 1"
          authorId: 8
          publisherId: 157
          publishingYear: 2026
      ) {
          id
          title
          publishingYear
          author {
              id
              surname
              name
       
          }
          publisher {
              id
              name
          }
      }
  }
variables: ""
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "const response = pm.response.data;\r

      pm.environment.set(\"bookId\", response.createBook.id);\r

      console.log(\"bookId:\", pm.environment.get(\"abookId\"));"
    language: text/javascript
order: 9000
