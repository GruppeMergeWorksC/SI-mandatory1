$kind: graphql-request
name: create-author
url: "{{baseUrl}}"
query: |
  mutation CreateAuthor {
      createAuthor(name: "Fiona", surname: "Puffytail") {
          id
          name
          surname
      }
  }
variables: ""
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "const response = pm.response.data;\r

      pm.environment.set(\"authorId\", response.createAuthor.id);\r

      console.log(\"authorId:\", pm.environment.get(\"authorId\"));"
    language: text/javascript
order: 7000
