$kind: graphql-request
name: get-book-by-id
url: "{{baseUrl}}"
query: |
  query Book {
      book(id: 1010) {
          id
          title
          publishingYear
          author {
              id
              name
              surname
          }
          publisher {
              id
              name
          }
      }
  }
variables: ""
schema:
  source: auto
order: 5000
