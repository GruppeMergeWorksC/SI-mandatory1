$kind: graphql-request
name: create-book-with-new-author-and-publisher
url: "{{baseUrl}}"
query: |
  mutation CreateBook ($authorId: Int!, $publisherId: Int! ){
      createBook(
          title: "How to Obtain Baskets of Kittens Vol 2"
          authorId: $authorId
          publisherId: $publisherId
          publishingYear: 2026
      ) {
          id
          title
          publishingYear
          author {
              id
              surname
              name
       
          }
          publisher {
              id
              name
          }
      }
  }
variables: "{\r

  \  \"authorId\": {{authorId}},\r

  \  \"publisherId\": {{publisherId}}\r

  }"
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "const response = pm.response.data;\r

      pm.environment.set(\"bookId\", response.createBook.id);\r

      console.log(\"bookId:\", pm.environment.get(\"bookId\"));"
    language: text/javascript
order: 10000
