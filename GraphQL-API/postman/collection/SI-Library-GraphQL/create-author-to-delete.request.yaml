$kind: graphql-request
name: create-author-to-delete
url: "{{baseUrl}}"
query: |
  mutation CreateAuthor {
      createAuthor(name: "Cesare", surname: "Silktail") {
          id
          name
          surname
      }
  }
variables: ""
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "const response = pm.response.data;\r

      pm.environment.set(\"authorIdDel\", response.createAuthor.id);\r

      console.log(\"authorId to Delete:\",
      pm.environment.get(\"authorIdDel\"));"
    language: text/javascript
order: 6000
